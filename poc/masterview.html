<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requestr — Master View</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Masterview-only overrides */
    .header .nav-link[href="masterview.html"] { display: none; } /* hide self-link */
  </style>
</head>
<body>
  <div id="app-header"></div>
  <div id="app-modal"></div>

  <!-- Confirm dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <h3 id="confirmTitle">Are you sure?</h3>
      <p id="confirmMsg"></p>
      <div class="confirm-actions">
        <button class="btn btn-outline btn-sm" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirmOk">Yes, proceed</button>
      </div>
    </div>
  </div>

  <main class="main">
    <div class="container">

      <!-- Banner -->
      <div class="master-banner">
        <div class="master-banner-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div>
          <h2>Master View</h2>
          <p>Private admin panel — copy TMDB IDs, manage the wish list. Not linked from anywhere.</p>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Requests</div>
          <div class="stat-value accent" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Movies</div>
          <div class="stat-value" id="statMovies">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">TV Series</div>
          <div class="stat-value" id="statTV">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Requestors</div>
          <div class="stat-value" id="statPeople">0</div>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <!-- Filter pills -->
        <button class="pill active" data-filter="all">All</button>
        <button class="pill" data-filter="movie">Movies</button>
        <button class="pill" data-filter="tv">TV Series</button>

        <div class="action-bar-right">
          <button class="btn btn-outline btn-sm" id="copyAllBtn" title="Copy all TMDB IDs as a list">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy All IDs
          </button>
          <button class="btn btn-danger btn-sm" id="clearAllBtn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
            Clear All
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:46px;"></th>
              <th>Title</th>
              <th>Type</th>
              <th>TMDB ID</th>
              <th>Requested By</th>
              <th>Date</th>
              <th style="text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyTable" style="display:none;">
          <div class="empty-state" style="padding:3rem 2rem;">
            <div class="empty-icon">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.25" style="width:48px;height:48px;">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              </svg>
            </div>
            <h3>Wish list is empty</h3>
            <p>Nothing to action yet.</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
  <script>
    let currentFilter = 'all';
    let pendingAction = null;

    // ── Filter pills ──────────────────────────────────────────
    document.querySelectorAll('.pill[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    // ── Copy All IDs ──────────────────────────────────────────
    document.getElementById('copyAllBtn').addEventListener('click', async () => {
      const list = getWishlist();
      const filtered = currentFilter === 'all' ? list : list.filter(i => i.type === currentFilter);
      if (!filtered.length) { toast('Nothing to copy', 'info'); return; }
      const ids = filtered.map(i => 'tmdb:' + String(i.id)).join('\n');
      await copyText(ids);
      toast(`Copied ${filtered.length} TMDB ID${filtered.length > 1 ? 's' : ''}`, 'success');
    });

    // ── Clear All ─────────────────────────────────────────────
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      const count = getWishlist().length;
      if (!count) { toast('Already empty', 'info'); return; }
      showConfirm(
        'Clear entire wish list?',
        `This will permanently delete all ${count} request${count > 1 ? 's' : ''}. This cannot be undone.`,
        () => {
          clearWishlist();
          render();
          updateStats();
          toast('Wish list cleared', 'danger');
        }
      );
    });

    // ── Render Table ──────────────────────────────────────────
    function render() {
      let list = getWishlist();
      if (currentFilter !== 'all') list = list.filter(i => i.type === currentFilter);

      const body  = document.getElementById('tableBody');
      const empty = document.getElementById('emptyTable');

      if (!list.length) {
        body.innerHTML = '';
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';
      body.innerHTML = list.map(item => buildRow(item)).join('');
    }

    function buildRow(item) {
      const posterEl = item.poster
        ? `<img class="table-thumb" src="${item.poster}" alt="${item.title}"
                onerror="this.outerHTML='<div class=\\'table-thumb-ph\\'>🎬</div>'" loading="lazy">`
        : `<div class="table-thumb-ph">🎬</div>`;

      const typeBadge = `<span class="card-type-badge ${item.type}" style="position:static; font-size:.68rem;">
        ${item.type === 'tv' ? 'TV' : 'Film'}
      </span>`;

      const initials = item.requested_by ? getInitials(item.requested_by) : '?';

      return `
        <tr data-id="${item.id}">
          <td>${posterEl}</td>
          <td class="td-title">
            ${item.title}
            <small>${item.year}</small>
          </td>
          <td>${typeBadge}</td>
          <td>
            <span class="tmdb-id" id="tmdb-${item.id}">${item.id}</span>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:.4rem;">
              <div class="meta-avatar">${initials}</div>
              <span style="font-size:.84rem;">${item.requested_by ?? 'Anonymous'}</span>
            </div>
          </td>
          <td style="color:var(--text-3); font-size:.82rem;">${fmtDate(item.requested_at)}</td>
          <td>
            <div class="td-actions" style="justify-content:flex-end;">
              <button class="btn btn-outline btn-sm" onclick="copyId(${item.id})" title="Copy TMDB ID" id="copy-btn-${item.id}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;">
                  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy ID
              </button>
              <button class="btn-icon-only" onclick="deleteItem(${item.id}, '${item.title.replace(/'/g, "\\'")}')" title="Remove this request">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      `;
    }

    // ── Copy single ID ────────────────────────────────────────
    async function copyId(id) {
      await copyText('tmdb:' + String(id));
      const btn = document.getElementById(`copy-btn-${id}`);
      if (btn) {
        const original = btn.innerHTML;
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:13px;height:13px;"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        btn.style.color = 'var(--success)';
        btn.style.borderColor = 'var(--success)';
        setTimeout(() => {
          btn.innerHTML = original;
          btn.style.color = '';
          btn.style.borderColor = '';
        }, 1800);
      }
      toast(`Copied ID ${id}`, 'success');
    }

    // ── Delete single item ────────────────────────────────────
    function deleteItem(id, title) {
      showConfirm(
        `Remove "${title}"?`,
        'This will remove the request from the wish list.',
        () => {
          removeFromWishlist(id);
          render();
          updateStats();
          toast(`Removed "${title}"`, 'danger');
        }
      );
    }

    // ── Stats ─────────────────────────────────────────────────
    function updateStats() {
      const list = getWishlist();
      document.getElementById('statTotal').textContent  = list.length;
      document.getElementById('statMovies').textContent = list.filter(i => i.type === 'movie').length;
      document.getElementById('statTV').textContent     = list.filter(i => i.type === 'tv').length;
      const people = new Set(list.map(i => i.requested_by).filter(Boolean)).size;
      document.getElementById('statPeople').textContent = people;
    }

    // ── Confirm dialog ────────────────────────────────────────
    function showConfirm(title, msg, onOk) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMsg').textContent   = msg;
      pendingAction = onOk;
      document.getElementById('confirmOverlay').classList.add('open');
    }
    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('open');
      pendingAction = null;
    }
    document.getElementById('confirmOk').addEventListener('click', () => {
      if (pendingAction) pendingAction();
      closeConfirm();
    });
    document.getElementById('confirmOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('confirmOverlay')) closeConfirm();
    });

    // ── Init ──────────────────────────────────────────────────
    initApp('masterview');
    render();
    updateStats();
  </script>
</body>
</html>
