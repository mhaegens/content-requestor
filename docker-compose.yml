services:

  # ── Content Requestor app ───────────────────────────────────────────────
  app:
    image: content-requestor:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Read from the .env file on the host — never baked into the image
      - TMDB_READ_TOKEN=${TMDB_READ_TOKEN}
    volumes:
      # Persist the SQLite database across container restarts/updates
      - ./data:/app/data
    ports:
      # Bind to all interfaces so the Proxmox host's cloudflared daemon
      # can reach the app at <CT-IP>:3000 via the homelab tunnel.
      # The LXC sits on the internal LAN; no inbound ports are opened on
      # the router — public access goes exclusively through the Cloudflare Tunnel.
      - "0.0.0.0:3000:3000"
    # Drop all Linux capabilities — the app needs none of them
    cap_drop:
      - ALL
    # Read-only root filesystem; only the data volume is writable
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
