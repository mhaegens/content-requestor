volumes:
  # Named volume for the SQLite database.
  #
  # WHY a named volume instead of a bind-mount (./data:/app/data):
  # With a bind-mount Docker creates ./data as root:root on the host.
  # The container's non-root `nextjs` user (UID 1001) then cannot write
  # to /app/data, so `new Database(...)` throws EACCES and every
  # POST /api/requests returns 500 ("Failed to add request").
  #
  # A named volume is initialised by Docker from the image layer, which
  # already has `chown nextjs:nodejs /app/data`, so the correct ownership
  # is preserved and the app can write the SQLite file on first run.
  #
  # To inspect or back up the database:
  #   docker volume inspect content-requestor_app_data
  #   docker run --rm -v content-requestor_app_data:/data alpine ls /data
  app_data:

services:

  # ── Content Requestor app ───────────────────────────────────────────────
  app:
    image: content-requestor:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Read from the .env file on the host — never baked into the image
      - TMDB_READ_TOKEN=${TMDB_READ_TOKEN}
    volumes:
      # Persist the SQLite database across container restarts/updates
      - app_data:/app/data
    ports:
      # Bind to all interfaces so the Proxmox host's cloudflared daemon
      # can reach the app at <CT-IP>:3000 via the homelab tunnel.
      # The LXC sits on the internal LAN; no inbound ports are opened on
      # the router — public access goes exclusively through the Cloudflare Tunnel.
      - "0.0.0.0:3000:3000"
    # Drop all Linux capabilities — the app needs none of them
    cap_drop:
      - ALL
    # Read-only root filesystem; only the data volume is writable
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
